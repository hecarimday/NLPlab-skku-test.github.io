# 사이트 전역 설정
title: "NLP Lab Notice"
description: "연구실 주요 소식 및 공지사항"
url: "https://hecarimday.github.io" 
baseurl: "" # 주소 뒤에 경로가 더 있다면 수정이 필요하지만, 보통 비워둡니다.

# 1. 플러그인 설정 (이 부분이 있어야 paginator가 작동합니다)
plugins:
  - jekyll-paginate

# 2. 페이지네이션 상세 설정
paginate: 10
paginate_path: "/notice/page:num/" # 공지사항 목록 파일이 있는 경로와 맞춰야 합니다.

# 3. 빌드 설정
markdown: kramdown
highlighter: rouge
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .jekyll-cache
  - .sass-cache